<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title desc">
  <title id="title">Git Cleaner — TUI for browsing and bulk-deleting git branches</title>
  <desc id="desc">A terminal-themed hero showing Git Cleaner's branch tree interface with selection, date filters, and maintenance dashboard.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#1a7f37"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="12" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#c9d1d9" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="500" y1="0" x2="500" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="700" y1="0" x2="700" y2="380"/>
    <line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="900" y1="0" x2="900" y2="380"/>
    <line x1="1000" y1="0" x2="1000" y2="380"/>
    <line x1="1100" y1="0" x2="1100" y2="380"/>
  </g>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="3" rx="0" fill="url(#accent-line)"/>

  <!-- Title block -->
  <g transform="translate(64 48)">
    <!-- Category label -->
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#8b949e" letter-spacing="2" text-transform="uppercase">
      GIT BRANCH MANAGEMENT TUI
    </text>

    <!-- Project name -->
    <text x="0" y="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="52" font-weight="700" fill="#e6edf3" letter-spacing="-1">
      Git Cleaner
    </text>

    <!-- Tagline -->
    <text x="0" y="90" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="20" fill="#8b949e">
      Browse, filter, and bulk-delete branches from a fast terminal UI.
    </text>

    <!-- Install command -->
    <g transform="translate(0 116)">
      <rect width="340" height="36" rx="6" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="14" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="14" fill="#8b949e">$</text>
      <text x="30" y="24" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="14" fill="#7ee787">uv tool install git-cleaner-tui</text>
    </g>

    <!-- Badges -->
    <g transform="translate(0 172)">
      <rect width="68" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="34" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#79c0ff" text-anchor="middle">Python</text>

      <g transform="translate(78 0)">
        <rect width="90" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
        <text x="45" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#d2a8ff" text-anchor="middle">Textual 8.x</text>
      </g>

      <g transform="translate(178 0)">
        <rect width="52" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
        <text x="26" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#7ee787" text-anchor="middle">MIT</text>
      </g>
    </g>
  </g>

  <!-- Terminal mockup — right side -->
  <g transform="translate(630 32)">
    <rect width="560" height="310" rx="10" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>

    <!-- Terminal title bar -->
    <rect width="560" height="32" rx="10" fill="#161b22"/>
    <rect y="22" width="560" height="10" fill="#161b22"/>
    <circle cx="20" cy="16" r="5" fill="#ff5f56"/>
    <circle cx="38" cy="16" r="5" fill="#ffbd2e"/>
    <circle cx="56" cy="16" r="5" fill="#27c93f"/>
    <text x="280" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" fill="#8b949e" text-anchor="middle">git-cleaner-tui</text>

    <!-- Tab bar -->
    <g transform="translate(0 32)">
      <rect width="93" height="28" fill="#0d1117"/>
      <text x="14" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#e6edf3" font-weight="600">Branches</text>
      <line x1="93" y1="0" x2="93" y2="28" stroke="#30363d" stroke-width="1"/>

      <rect x="93" width="100" height="28" fill="#161b22"/>
      <text x="107" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#8b949e">Maintenance</text>
      <line x1="193" y1="0" x2="193" y2="28" stroke="#30363d" stroke-width="1"/>

      <rect x="193" width="68" height="28" fill="#161b22"/>
      <text x="207" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#8b949e">Stashes</text>
      <line x1="261" y1="0" x2="261" y2="28" stroke="#30363d" stroke-width="1"/>

      <rect x="261" width="90" height="28" fill="#161b22"/>
      <text x="275" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#8b949e">Commits</text>
      <line x1="351" y1="0" x2="351" y2="28" stroke="#30363d" stroke-width="1"/>

      <rect x="351" width="85" height="28" fill="#161b22"/>
      <text x="365" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#8b949e">Compare</text>
      <line x1="436" y1="0" x2="436" y2="28" stroke="#30363d" stroke-width="1"/>

      <rect x="436" width="124" height="28" fill="#161b22"/>
      <text x="450" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#8b949e">Worktrees</text>
    </g>

    <!-- Branch tree content -->
    <g transform="translate(16 72)">
      <!-- Tree lines and branches -->
      <!-- feature/ group (expanded) -->
      <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#8b949e">▾ feature/</text>

      <!-- Selected row -->
      <rect x="-6" y="8" width="548" height="22" rx="4" fill="#1f6feb22"/>
      <text x="14" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#e6edf3">  ├─ user-auth</text>
      <text x="220" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">3d ago</text>
      <text x="320" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">+12 -4</text>
      <rect x="440" y="10" width="44" height="18" rx="9" fill="#238636" opacity="0.3"/>
      <text x="462" y="23" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="10" fill="#7ee787" text-anchor="middle">stale</text>

      <text x="14" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#e6edf3">  ├─ api-refactor</text>
      <text x="220" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">14d ago</text>
      <text x="320" y="46" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">+87 -32</text>

      <text x="14" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#e6edf3">  └─ dark-mode</text>
      <text x="220" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">45d ago</text>
      <text x="320" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">+203 -89</text>
      <rect x="440" y="54" width="44" height="18" rx="9" fill="#238636" opacity="0.3"/>
      <text x="462" y="67" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="10" fill="#7ee787" text-anchor="middle">stale</text>

      <!-- bugfix/ group -->
      <text x="0" y="96" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#8b949e">▾ bugfix/</text>

      <text x="14" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#e6edf3">  ├─ login-timeout</text>
      <text x="220" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">2d ago</text>
      <text x="320" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">+5 -2</text>

      <text x="14" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#e6edf3">  └─ crash-report</text>
      <text x="220" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">90d ago</text>
      <text x="320" y="136" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e">+12 -3</text>
      <rect x="440" y="124" width="44" height="18" rx="9" fill="#238636" opacity="0.3"/>
      <text x="462" y="137" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="10" fill="#7ee787" text-anchor="middle">stale</text>

      <!-- release/ group -->
      <text x="0" y="166" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="13" fill="#8b949e">▸ release/</text>

      <!-- Date filter bar -->
      <g transform="translate(0 184)">
        <rect width="530" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="10" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Filter:</text>
        <rect x="56" y="5" width="30" height="16" rx="3" fill="#30363d"/>
        <text x="71" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#e6edf3" text-anchor="middle">7d</text>
        <rect x="90" y="5" width="30" height="16" rx="3" fill="#30363d"/>
        <text x="105" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#e6edf3" text-anchor="middle">30d</text>
        <rect x="124" y="5" width="30" height="16" rx="3" fill="#1f6feb"/>
        <text x="139" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#ffffff" text-anchor="middle">90d</text>
        <rect x="158" y="5" width="30" height="16" rx="3" fill="#30363d"/>
        <text x="173" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#e6edf3" text-anchor="middle">1y</text>

        <text x="210" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Protect:</text>
        <text x="266" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#e6edf3">ON</text>

        <text x="310" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Remote:</text>
        <text x="364" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#e6edf3">OFF</text>

        <text x="410" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Undo:</text>
        <rect x="444" y="5" width="30" height="16" rx="3" fill="#238636"/>
        <text x="459" y="16" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#ffffff" text-anchor="middle">u</text>
      </g>

      <!-- Status bar -->
      <g transform="translate(0 218)">
        <rect width="530" height="22" rx="4" fill="#161b22"/>
        <text x="10" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#7ee787">6 branches</text>
        <text x="100" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">|</text>
        <text x="116" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#d29922">3 stale</text>
        <text x="180" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">|</text>
        <text x="196" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#f85149">2 selected</text>
        <text x="420" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Ctrl+B bookmarks</text>
      </g>
    </g>
  </g>
</svg>
