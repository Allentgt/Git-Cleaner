<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="380" viewBox="0 0 1200 380"
     role="img" aria-labelledby="title2 desc2">
  <title id="title2">Git Cleaner — TUI for browsing and bulk-deleting git branches</title>
  <desc id="desc2">Alternate hero with a dramatic diagonal split and branch-tree motif.</desc>

  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .cursor { animation: blink 1s step-end infinite }
    </style>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#010409"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#238636" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#238636" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="terminal-clip">
      <rect width="480" height="270" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" fill="url(#bg2)"/>

  <!-- Diagonal accent glow -->
  <polygon points="0,0 600,0 300,380 0,380" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#c9d1d9" stroke-width="0.5">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="380"/>
    <line x1="200" y1="0" x2="200" y2="380"/>
    <line x1="300" y1="0" x2="300" y2="380"/>
    <line x1="400" y1="0" x2="400" y2="380"/>
    <line x1="500" y1="0" x2="500" y2="380"/>
    <line x1="600" y1="0" x2="600" y2="380"/>
    <line x1="700" y1="0" x2="700" y2="380"/>
    <line x1="800" y1="0" x2="800" y2="380"/>
    <line x1="900" y1="0" x2="900" y2="380"/>
    <line x1="1000" y1="0" x2="1000" y2="380"/>
    <line x1="1100" y1="0" x2="1100" y2="380"/>
  </g>

  <!-- Title block -->
  <g transform="translate(120 60)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="12" fill="#7ee787" letter-spacing="3">
      TERMINAL UI
    </text>

    <text x="0" y="56" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="58" font-weight="800" fill="#ffffff" letter-spacing="-2">
      Git
      <tspan fill="#7ee787">Cleaner</tspan>
    </text>

    <text x="0" y="92" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="18" fill="#8b949e" letter-spacing="0.3">
      Browse. Filter. Bulk-delete. All from your terminal.
    </text>

    <!-- Install -->
    <g transform="translate(0 118)">
      <rect width="380" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="16" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="15" fill="#8b949e">$</text>
      <text x="34" y="26" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="15" fill="#7ee787">uv tool install git-cleaner-tui</text>
      <rect x="295" y="12" width="8" height="18" rx="1" fill="#30363d" class="cursor"/>
    </g>

    <!-- Badges -->
    <g transform="translate(0 182)">
      <rect width="68" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
      <text x="34" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#79c0ff" text-anchor="middle">Python</text>

      <g transform="translate(78 0)">
        <rect width="90" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
        <text x="45" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#d2a8ff" text-anchor="middle">Textual 8.x</text>
      </g>

      <g transform="translate(178 0)">
        <rect width="52" height="22" rx="11" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
        <text x="26" y="15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#7ee787" text-anchor="middle">MIT</text>
      </g>
    </g>
  </g>

  <!-- Terminal inset — right side, floating card style -->
  <g transform="translate(630 40)">
    <!-- Shadow -->
    <rect x="4" y="4" width="480" height="270" rx="8" fill="#000000" opacity="0.4"/>

    <!-- Terminal body -->
    <g clip-path="url(#terminal-clip)">
      <rect width="480" height="270" fill="#0d1117"/>

      <!-- Title bar -->
      <rect width="480" height="28" fill="#161b22"/>
      <circle cx="16" cy="14" r="4.5" fill="#ff5f56"/>
      <circle cx="32" cy="14" r="4.5" fill="#ffbd2e"/>
      <circle cx="48" cy="14" r="4.5" fill="#27c93f"/>
      <text x="240" y="18" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#8b949e" text-anchor="middle">git-cleaner-tui</text>

      <!-- Branches tab active -->
      <g transform="translate(0 28)">
        <rect width="80" height="24" fill="#0d1117"/>
        <text x="12" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#e6edf3" font-weight="600">Branches</text>
        <line x1="80" y1="0" x2="80" y2="24" stroke="#30363d" stroke-width="1"/>

        <rect x="80" width="88" height="24" fill="#161b22"/>
        <text x="92" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Maintain.</text>
        <line x1="168" y1="0" x2="168" y2="24" stroke="#30363d" stroke-width="1"/>

        <rect x="168" width="60" height="24" fill="#161b22"/>
        <text x="180" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Stashes</text>
        <line x1="228" y1="0" x2="228" y2="24" stroke="#30363d" stroke-width="1"/>

        <rect x="228" width="68" height="24" fill="#161b22"/>
        <text x="240" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Commits</text>
        <line x1="296" y1="0" x2="296" y2="24" stroke="#30363d" stroke-width="1"/>

        <rect x="296" width="74" height="24" fill="#161b22"/>
        <text x="308" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Compare</text>
        <line x1="370" y1="0" x2="370" y2="24" stroke="#30363d" stroke-width="1"/>

        <rect x="370" width="110" height="24" fill="#161b22"/>
        <text x="382" y="17" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="11" fill="#8b949e">Worktrees</text>
      </g>

      <!-- Branch tree -->
      <g transform="translate(14 64)">
        <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#8b949e">▾ feature/</text>

        <!-- Selected row -->
        <rect x="-4" y="6" width="468" height="20" rx="3" fill="#1f6feb22"/>
        <text x="12" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#e6edf3">  ├─ user-auth</text>
        <text x="190" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">3d</text>
        <text x="250" y="20" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">+12 -4</text>
        <rect x="380" y="8" width="36" height="14" rx="7" fill="#238636" opacity="0.35"/>
        <text x="398" y="19" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="9" fill="#7ee787" text-anchor="middle">stale</text>

        <text x="12" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#e6edf3">  ├─ api-refactor</text>
        <text x="190" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">14d</text>
        <text x="250" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">+87 -32</text>

        <text x="12" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#e6edf3">  └─ dark-mode</text>
        <text x="190" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">45d</text>
        <text x="250" y="58" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">+203 -89</text>
        <rect x="380" y="46" width="36" height="14" rx="7" fill="#238636" opacity="0.35"/>
        <text x="398" y="57" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="9" fill="#7ee787" text-anchor="middle">stale</text>

        <text x="0" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#8b949e">▾ bugfix/</text>

        <text x="12" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#e6edf3">  ├─ login-timeout</text>
        <text x="190" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">2d</text>
        <text x="250" y="98" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">+5 -2</text>

        <text x="12" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#e6edf3">  └─ crash-report</text>
        <text x="190" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">90d</text>
        <text x="250" y="116" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#8b949e">+12 -3</text>
        <rect x="380" y="104" width="36" height="14" rx="7" fill="#238636" opacity="0.35"/>
        <text x="398" y="115" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="9" fill="#7ee787" text-anchor="middle">stale</text>

        <text x="0" y="138" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#8b949e">▸ release/</text>

        <!-- Status bar -->
        <g transform="translate(0 154)">
          <rect width="452" height="20" rx="3" fill="#161b22"/>
          <text x="8" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#7ee787">6 branches</text>
          <text x="80" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#d29922">· 3 stale</text>
          <text x="146" y="14" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="10" fill="#f85149">· 2 selected</text>
        </g>
      </g>
    </g>
  </g>
</svg>
